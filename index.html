<style>
  :root { --b: rgb(4, 72, 4); --p: rgb(253, 83, 227); --pw: 300px; }

  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { background: #000; font-family: 'VT323', Arial, sans-serif; font-size: 20px; line-height: 1.5; }

  * { cursor: url("data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2220%22%20height%3D%2220%22%20viewBox%3D%220%200%2032%2032%22%3E%3Cpolygon%20points%3D%2216%2C3%2019.5%2C12.5%2030%2C12.5%2021.5%2C18.5%2024.5%2C28%2016%2C22%207.5%2C28%2010.5%2C18.5%202%2C12.5%2012.5%2C12.5%22%20fill%3D%22black%22%2F%3E%3C%2Fsvg%3E") 10 10, auto !important; }

  #space { position: fixed; inset: 0; z-index: 0; }

  /* ── click-to-enter overlay ── */
  #intro {
    position: fixed;
    inset: 0;
    z-index: 50;
    cursor: inherit;
  }
  #intro.gone { display: none; }

  /* ── page grows from a dot ── */
  #page {
    position: relative; z-index: 2;
    background: var(--p);
    max-width: 860px;
    margin: 30px auto 40px;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 0 60px rgba(253,117,233,0.4), 0 0 20px rgba(0,0,0,0.8);
    isolation: isolate;
    clip-path: circle(0% at 50% 50%);
    transition: clip-path 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  }
  #page.visible {
    clip-path: circle(150% at 50% 50%);
  }

  #nav { margin: 0 0 16px; display: flex; gap: 4px; flex-wrap: wrap; justify-content: center; }
  #bio-photo { opacity: 0; }
  #bio-photo.visible { opacity: 1; }
  .nav-btn { background: none; border: none; color: var(--b); font-family: 'VT323', sans-serif; font-size: 21px; padding: 1px 12px; opacity: 0; }
  .nav-btn.visible { opacity: 1; }
  .nav-btn:hover, .nav-btn.active { background: var(--b); color: #fff; border: none; }

  .section { display: none; }
  .section.active { display: block; }

  h1, h2 {
    color: transparent; background: transparent;
    /* border-bottom: 3px solid #000; */
    font-family: 'VT323', sans-serif; font-weight: 900;
    margin: 0 0 10px; padding: 0 8px; line-height: 1.1;
    font-size: 2em; text-align: center;

  h1 { font-size: 2.6em; }
  h2 { margin-top: 20px; }
  h3 { color: #000; font-family: 'VT323', sans-serif; font-size: 22px; margin: 0 0 2px; }

  p { color: #000; margin: 0 0 6px; }
  a { color: #000; }
  img { display: block; max-width: 500px; width: 100%; margin: 8px 0; border: 2px solid var(--b)}

  #currently {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 100;
    background: var(--b);
    color: var(--p);
    font-family: 'VT323', sans-serif;
    font-size: 22px;
    line-height: 1;
    padding: 6px 0;
    overflow: hidden;
    white-space: nowrap;
  }
  #currently-track {
    display: inline-flex;
    will-change: transform;
  }
  .currently-copy {
    display: inline-block;
    padding-right: 80px; /* gap between repetitions */
  }

  #sort-bar { margin: 6px 0 10px; font-size: 18px; text-align: right; }
  .sort-btn { background: none; border: 2px solid var(--b); font-family: 'VT323', sans-serif; font-size: 17px; padding: 1px 8px; margin-left: 4px; }
  .sort-btn:hover, .sort-btn.active { background: var(--b); color: #fff; }

  .entries { margin-top: 6px; columns: 2; column-gap: 16px; }
  .entry {
    break-inside: avoid;
    margin-bottom: 14px;
    border: 2px solid var(--b);
    padding: 10px 12px 12px;
    background: rgba(255,255,255,0.15);
  }
  .entry-date { font-size: 15px; color: #555; margin-bottom: 2px; }

  @media (max-width: 540px) {
    .entries { columns: 1; }
  }

  .link-btn { display: inline-block; background: var(--p); color: var(--b); border: 2px solid var(--b); padding: 3px 14px; margin-top: 6px; font-family: 'VT323', sans-serif; font-size: 20px; text-decoration: none; }
  .link-btn:hover { background: var(--b); color: #fff; }

  video { display: block; width: 100%; max-width: var(--pw); margin: 8px 0 0; }
  .player { background: var(--p); border: 2px solid var(--b); padding: 5px 10px; width: 100%; max-width: var(--pw); margin: 8px 0 0; }
  .vplayer video { margin: 0 0 5px; border-bottom: 2px solid var(--b); }
  .controls { display: flex; align-items: center; gap: 8px; }
  .player button { background: none; border: 2px solid var(--b); color: var(--b); font-size: 14px; width: 26px; height: 26px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .player button:hover { background: var(--b); color: #fff; }
  .bar-wrap { flex: 1; height: 4px; background: rgba(90,20,50,0.2); }
  .bar-fill { height: 100%; background: var(--b); width: 0%; pointer-events: none; }
  .player .time { color: var(--b); font-size: 15px; flex-shrink: 0; min-width: 36px; text-align: right; }

  .blog-entry { margin-bottom: 12px; border-bottom: 2px solid rgba(90,20,50,0.2); padding-bottom: 12px; }
  .blog-entry:last-child { border-bottom: none; }
  .blog-header { display: flex; align-items: baseline; gap: 12px; user-select: none; }
  .blog-header:hover .blog-title { text-decoration: underline; }
  .blog-title { font-family: 'VT323', sans-serif; font-size: 21px; color: #000; margin: 0; }
  .blog-date { font-size: 15px; color: #555; flex-shrink: 0; }
  .blog-arrow { font-size: 16px; color: var(--b); margin-left: auto; flex-shrink: 0; }
  .blog-body { display: none; margin-top: 8px; }
  .blog-body.open { display: block; }

  .links-list { list-style: none; padding: 0; margin: 8px 0 16px; }
  .links-list li { margin-bottom: 4px; }
  .links-list a { color: #000; font-size: 20px; }

  #speaker-btn {
    position: fixed;
    bottom: 46px;
    right: 16px;
    z-index: 200;
    background: var(--p);
    border: 2px solid var(--b);
    color: var(--b);

    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }
  #speaker-btn:hover { background: var(--b); color: var(--p); }
</style>

<script>
  // ── helpers ──────────────────────────────────────────────────
  const $ = id => document.getElementById(id);
  document.title = TITLE.replace(/[★\s]+/g, ' ').trim();

  const audioHTML = f => `<div class="player" data-src="${f}"><div class="controls"><button class="play-btn">▶</button><div class="bar-wrap"><div class="bar-fill"></div></div><span class="time">0:00</span></div></div>`;
  const videoHTML = f => `<div class="player vplayer" data-src="${f}"><video><source src="${f}"></video><div class="controls"><button class="play-btn">▶</button><div class="bar-wrap"><div class="bar-fill"></div></div><span class="time">0:00</span><button class="fullscreen-btn" title="fullscreen">⛶</button></div></div>`;

  function mediaHTML(m, fallbackTitle) {
    if (m.type === 'audio') return audioHTML(m.file);
    if (m.type === 'video') return videoHTML(m.file);
    if (m.type === 'image') return `<img src="${m.file}" alt="${m.title || fallbackTitle || ''}">`;
    if (m.type === 'link')  return `<a class="link-btn" href="${m.url}" target="_blank">→ ${m.title || m.url}</a>`;
    return '';
  }

  function entryHTML(e) {
    const items = e.media || [e];
    return `<div class="entry">
      ${e.date        ? `<div class="entry-date">${e.date}</div>` : ''}
      ${e.title       ? `<h3>${e.title}</h3>` : ''}
      ${e.description ? `<p>${e.description}</p>` : ''}
      ${items.map(m => mediaHTML(m, e.title)).join('')}
    </div>`;
  }

  // ── players ──────────────────────────────────────────────────
  const fmt = s => isFinite(s) ? `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}` : '0:00';

  function initPlayers() {
    document.querySelectorAll('.player:not([data-init])').forEach(p => {
      p.dataset.init = '1';
      const isVid = p.classList.contains('vplayer');
      const m = isVid ? p.querySelector('video') : Object.assign(new Audio(), {src: p.dataset.src});
      const btn  = p.querySelector('.play-btn'),
            fill = p.querySelector('.bar-fill'),
            bar  = p.querySelector('.bar-wrap'),
            time = p.querySelector('.time'),
            fs   = p.querySelector('.fullscreen-btn');
      btn.onclick = () => {
        document.querySelectorAll('.player').forEach(o => {
          if (o !== p && o._m && !o._m.paused) { o._m.pause(); o.querySelector('.play-btn').textContent = '▶'; }
        });
        m.paused ? m.play() : m.pause();
      };
      m.onplay       = () => btn.textContent = '▐▐';
      m.onpause      = () => btn.textContent = '▶';
      m.onended      = () => { btn.textContent='▶'; fill.style.width='0%'; time.textContent='0:00'; m.currentTime=0; };
      m.ontimeupdate = () => { fill.style.width = (m.duration ? m.currentTime/m.duration*100 : 0) + '%'; time.textContent = fmt(m.currentTime); };
      bar.onclick    = ev => { if (m.duration) m.currentTime = (ev.offsetX / bar.offsetWidth) * m.duration; };
      if (fs) fs.onclick = () => m.requestFullscreen?.();
      p._m = m;
    });
  }

  // ── portfolio ─────────────────────────────────────────────────
  function renderPortfolio() {
    const items = [...PORTFOLIO].sort((a, b) => (b.date||'').localeCompare(a.date||''));
    $('entries').innerHTML = items.map(entryHTML).join('');
    initPlayers();
  }

  // ── nav ───────────────────────────────────────────────────────
  window.showSection = id => {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.sec === id);
      b.classList.add('visible');
    });
    $('sec-' + id).classList.add('active');
    if (id === 'portfolio') renderPortfolio();
    window.scrollTo(0, 0);
    typewrite(document.querySelector('h1'));
    if (window.bgAudioSetSection) bgAudioSetSection(id);
  };

  // ── build page ────────────────────────────────────────────────
  const linksHTML = LINKS.filter(l => l.url).map(l =>
    `<li><a href="${l.url}" target="_blank">${l.label}</a></li>`
  ).join('');

  document.getElementById('page').insertAdjacentHTML('beforeend', `
    <h1 id="top">${TITLE}</h1>
    <div id="nav">
      <button class="nav-btn active" data-sec="home"      onclick="showSection('home')">home</button>
      <button class="nav-btn"        data-sec="portfolio" onclick="showSection('portfolio')">not home</button>
      <button class="nav-btn"        data-sec="kontakt"   onclick="showSection('kontakt')">contact</button>
    </div>

    <div class="section active" id="sec-home">
      <p id="bio-intro"></p>
      ${BIO_PHOTO ? `<img id="bio-photo" src="${BIO_PHOTO}" alt="photo">` : ''}
      <p id="bio-text"></p>
    </div>

    <div class="section" id="sec-portfolio">
      <div class="entries" id="entries"></div>
    </div>

    <div class="section" id="sec-kontakt">
      <p>E-Mail: <a href="mailto:${EMAIL}">${EMAIL}</a></p>
      <p>${CONTACT_NOTE}</p>
      <p>${LINKS_NOTE}</p>
      <ul class="links-list">${linksHTML}</ul>
    </div>
  `);

  if (CURRENTLY) {
    document.body.insertAdjacentHTML('beforeend',
      `<div id="currently"><div id="currently-track">
        <span class="currently-copy">${CURRENTLY}</span>
        <span class="currently-copy">${CURRENTLY}</span>
      </div></div>`
    );
    const track = document.getElementById('currently-track');
    const copy  = track.querySelector('.currently-copy');
    let pos = 0;
    function tickerLoop() {
      pos -= 1.2;
      if (pos <= -copy.offsetWidth) pos += copy.offsetWidth;
      track.style.transform = `translateX(${pos}px)`;
      requestAnimationFrame(tickerLoop);
    }
    tickerLoop();
  }

  // ── typewriter (h1/h2) ────────────────────────────────────────
  window.typewrite = function(el, onDone) {
    const txt = el.dataset.txt || el.textContent;
    el.dataset.txt = txt;
    el.innerHTML = txt.split('').map(c =>
      c === '★' ? `<span style="color:#000">★</span>` : `<span style="color:transparent">${c}</span>`
    ).join('');
    if (el._tw) clearInterval(el._tw);
    const spans = [...el.querySelectorAll('span')].filter(s => s.textContent !== '★');
    let c = 0;
    el._tw = setInterval(() => {
      spans[c].style.color = '#000';
      if (++c >= spans.length) { clearInterval(el._tw); onDone?.(); }
    }, 50);
  };

  // ── typewriter (body paragraphs, 2 chars/tick) ────────────────
  function typewriteP(el, text, onDone) {
    el.textContent = '';
    let i = 0;
    const iv = setInterval(() => {
      el.textContent += text.slice(i, i + 2);
      i += 2;
      if (i >= text.length) { el.textContent = text; clearInterval(iv); onDone?.(); }
    }, 1);
  }

  // ── intro: click anywhere to enter ───────────────────────────
  const introEl    = document.getElementById('intro');
  const pageEl     = document.getElementById('page');
  const h1El       = document.querySelector('h1');
  const bioIntroEl = document.getElementById('bio-intro');
  const bioTextEl  = document.getElementById('bio-text');

  introEl.addEventListener('click', function handler() {
    introEl.removeEventListener('click', handler);
    introEl.classList.add('gone');
    pageEl.classList.add('visible');

    setTimeout(() => {
      typewrite(h1El);

      typewriteP(bioIntroEl, BIO_INTRO, () => {
        const photo = document.getElementById('bio-photo');
        if (photo) photo.classList.add('visible');

        setTimeout(() => {
          typewriteP(bioTextEl, BIO_TEXT, () => {
            document.querySelectorAll('.nav-btn').forEach((btn, i) => {
              setTimeout(() => btn.classList.add('visible'), i * 150);
            });
          });
        }, 200);
      });

      if (window.unlockAudio) unlockAudio();
      if (window.bgAudioSetSection) bgAudioSetSection('home');
    }, 620);
  });

  // h2 typewriter on scroll
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) typewrite(e.target); });
  }, {threshold: 0.1});
  document.querySelectorAll('h2').forEach(el => obs.observe(el));
</script>

<script>
  // ── starfield ─────────────────────────────────────────────────
  const cv = document.getElementById('space'), cx = cv.getContext('2d');
  const buf = document.createElement('canvas'), bx = buf.getContext('2d');
  cx.imageSmoothingEnabled = bx.imageSmoothingEnabled = false;

  const resize = () => { cv.width = buf.width = innerWidth; cv.height = buf.height = innerHeight; };
  resize(); window.onresize = resize;

  const stars = Array.from({length: 350}, () => ({
    x: Math.random(), y: Math.random(), r: Math.floor(Math.random()*4)+1, t: Math.random()*Math.PI*2
  }));
  const shoots = [];
  const spawnShoot = () => {
    shoots.push({x: Math.random()*innerWidth*0.7, y: Math.random()*innerHeight*0.5, len: 80+Math.random()*120, life: 1});
    setTimeout(spawnShoot, 2000 + Math.random()*4000);
  };
  spawnShoot();

  let frame = 0;
  (function draw() {
    bx.clearRect(0, 0, buf.width, buf.height);
    stars.forEach(s => {
      bx.fillStyle = `rgba(255,255,255,${(0.4 + 0.6*Math.sin(frame*0.04 + s.t)).toFixed(2)})`;
      bx.fillRect(s.x*buf.width|0, s.y*buf.height|0, s.r, s.r);
    });
    for (let i = shoots.length-1; i >= 0; i--) {
      const s = shoots[i], g = bx.createLinearGradient(s.x, s.y, s.x+s.len, s.y+s.len*0.3);
      g.addColorStop(0, 'rgba(255,255,255,0)');
      g.addColorStop(1, `rgba(255,255,255,${s.life.toFixed(2)})`);
      bx.strokeStyle = g; bx.lineWidth = 1.5;
      bx.beginPath(); bx.moveTo(s.x, s.y); bx.lineTo(s.x+s.len, s.y+s.len*0.3); bx.stroke();
      s.x += 4; s.y += 1.2; s.life -= 0.025;
      if (s.life <= 0) shoots.splice(i, 1);
    }
    cx.clearRect(0, 0, cv.width, cv.height);
    cx.drawImage(buf, 0, 0);
    frame++; requestAnimationFrame(draw);
  })();
</script>
<script>
  // ── background audio ──────────────────────────────────────────
  // ↓↓↓ PUT YOUR AUDIO FILENAME HERE (file must be in the same folder as index.html) ↓↓↓
  const BG_AUDIO_FILE = "background.mp3";
  // ↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑

  const SECTIONS_WITH_AUDIO = ['home', 'kontakt'];
  const FADE_IN_S   = 3;     // initial fade in seconds
  const FADE_MUT_S  = 0.5;   // mute/unmute fade seconds
  const CROSSFADE_S = 5;     // crossfade loop seconds

  let muted      = false;
  let audioReady = false;
  let audioLive  = false;
  let audioWants = true;
  let activeSrc  = null, activeFade = null;
  let nextSrc    = null, nextFade   = null;
  let loopTimer  = null;
  let bufferData = null;

  const ctx      = new (window.AudioContext || window.webkitAudioContext)();
  // Master mute node — sits between all sources and destination
  const muteGain = ctx.createGain();
  muteGain.gain.setValueAtTime(1, ctx.currentTime);
  muteGain.connect(ctx.destination);

  fetch(BG_AUDIO_FILE)
    .then(r => { if (!r.ok) throw new Error(`Not found: ${BG_AUDIO_FILE}`); return r.arrayBuffer(); })
    .then(arr => ctx.decodeAudioData(arr))
    .then(buf => { bufferData = buf; audioReady = true; if (audioLive && audioWants) startLoop(); })
    .catch(err => console.warn('Background audio:', err));

  // Make a source with its own fade gain → muteGain → destination
  function makeSource() {
    const src  = ctx.createBufferSource();
    const fade = ctx.createGain();
    src.buffer = bufferData;
    src.connect(fade);
    fade.connect(muteGain);
    // Start at near-zero (not 0) to avoid click
    fade.gain.setValueAtTime(0.0001, ctx.currentTime);
    src.start();
    return { src, fade };
  }

  function startLoop() {
    if (!bufferData || !audioLive) return;
    const dur = bufferData.duration;

    const a = makeSource();
    activeSrc = a.src; activeFade = a.fade;

    // Smooth exponential fade in — no click because we start from 0.0001
    activeFade.gain.exponentialRampToValueAtTime(1, ctx.currentTime + FADE_IN_S);

    function scheduleNext() {
      loopTimer = setTimeout(() => {
        // Fade out current
        activeFade.gain.linearRampToValueAtTime(0.0001, ctx.currentTime + CROSSFADE_S);
        // Start next and fade in
        const b = makeSource();
        nextSrc = b.src; nextFade = b.fade;
        nextFade.gain.exponentialRampToValueAtTime(1, ctx.currentTime + CROSSFADE_S);
        setTimeout(() => {
          try { activeSrc.stop(); } catch(e) {}
          activeSrc = nextSrc; activeFade = nextFade;
          nextSrc = nextFade = null;
          scheduleNext();
        }, CROSSFADE_S * 1000);
      }, (dur - CROSSFADE_S) * 1000);
    }
    scheduleNext();
  }

  function stopLoop() {
    clearTimeout(loopTimer);
    const t = ctx.currentTime;
    [activeFade, nextFade].forEach(g => {
      if (g) { g.gain.cancelScheduledValues(t); g.gain.linearRampToValueAtTime(0.0001, t + FADE_MUT_S); }
    });
    setTimeout(() => {
      [activeSrc, nextSrc].forEach(s => { try { s?.stop(); } catch(e) {} });
      activeSrc = activeFade = nextSrc = nextFade = null;
    }, (FADE_MUT_S + 0.1) * 1000);
  }

  window.bgAudioSetSection = id => {
    audioWants = SECTIONS_WITH_AUDIO.includes(id);
    if (audioWants && !activeSrc && audioLive && audioReady) startLoop();
    else if (!audioWants && activeSrc) stopLoop();
  };

  window.unlockAudio = () => {
    if (audioLive) return;
    audioLive = true;
    ctx.resume().then(() => { if (audioWants && audioReady) startLoop(); });
  };

  const SVG_ON  = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 18 18" fill="currentColor"><rect x="1" y="6" width="4" height="6"/><polygon points="5,6 10,2 10,16 5,12"/><path d="M12 5 Q15 9 12 13" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M13.5 3 Q18 9 13.5 15" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>`;
  const SVG_OFF = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 18 18" fill="currentColor"><rect x="1" y="6" width="4" height="6"/><polygon points="5,6 10,2 10,16 5,12"/><line x1="12" y1="5" x2="17" y2="13" stroke="currentColor" stroke-width="2"/><line x1="17" y1="5" x2="12" y2="13" stroke="currentColor" stroke-width="2"/></svg>`;

  document.body.insertAdjacentHTML('beforeend', `<button id="speaker-btn" title="toggle sound">${SVG_ON}</button>`);
  document.getElementById('speaker-btn').onclick = () => {
    muted = !muted;
    document.getElementById('speaker-btn').innerHTML = muted ? SVG_OFF : SVG_ON;
    const t = ctx.currentTime;
    muteGain.gain.cancelScheduledValues(t);
    muteGain.gain.setValueAtTime(muteGain.gain.value, t);
    muteGain.gain.linearRampToValueAtTime(muted ? 0 : 1, t + FADE_MUT_S);
  };
</script>

<script>
  // ── star cursor trail ─────────────────────────────────────────
  document.addEventListener('mousemove', e => {
    const el = document.createElement('span');
    el.textContent = '★';
    const size  = 10 + Math.random() * 14;
    const angle = (Math.random() - 0.5) * 40;
    el.style.cssText = `position:fixed;left:${e.clientX - size/2}px;top:${e.clientY - size/2}px;font-size:${size}px;line-height:1;color:#000;pointer-events:none;z-index:9999;transform:rotate(${angle}deg);transition:opacity 0.5s ease,transform 0.5s ease;opacity:1`;
    document.body.appendChild(el);
    requestAnimationFrame(() => {
      el.style.opacity = '0';
      el.style.transform = `rotate(${angle + (Math.random()-0.5)*60}deg) translateY(-18px)`;
    });
    setTimeout(() => el.remove(), 520);
  });
</script>
